<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VM-tips 2026 — Ställningen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F4F0; --surface:#FFFFFF; --ink:#1B1D1A; --muted:#73766D;
  --faint:#A2A49B; --line:#E5E5DE; --line-soft:#EEEEE8;
  --accent:#2F5D62; --accent-deep:#244A4E; --accent-tint:#E6EDEC;
  --p7:#244A4E; --p5:#41716F; --p3:#7CA0A0; --p2:#B4CBCA; --p0:#E5E5DE;
  --radius:14px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;
  font-size:16px; line-height:1.45; font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:740px; margin:0 auto; padding:28px 18px 80px}
.tnum{font-variant-numeric:tabular-nums}

/* Header */
header{margin:14px 2px 22px}
.eyebrow{font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:600}
h1{font-size:40px; line-height:1.02; letter-spacing:-.02em; margin:.18em 0 .12em; font-weight:700}
.sub{color:var(--muted); font-size:14.5px}
.sub .dot{color:var(--faint); margin:0 .5em}

/* Segmented control */
.seg{display:inline-flex; background:var(--surface); border:1px solid var(--line);
  border-radius:999px; padding:4px; margin:22px 0 18px; gap:2px}
.seg button{appearance:none; border:0; background:transparent; cursor:pointer;
  font:inherit; font-weight:600; font-size:14px; color:var(--muted);
  padding:7px 18px; border-radius:999px; transition:.18s}
.seg button[aria-selected="true"]{background:var(--ink); color:#fff}
.seg button:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

/* Standings */
.board{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
.thead{display:grid; grid-template-columns:34px 1fr auto; gap:12px; padding:11px 18px;
  border-bottom:1px solid var(--line); color:var(--faint);
  font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:600}
.thead .p{justify-self:end}
.row{border-bottom:1px solid var(--line-soft)}
.row:last-child{border-bottom:0}
.rmain{display:grid; grid-template-columns:34px 1fr auto; gap:12px; align-items:center;
  width:100%; text-align:left; background:transparent; border:0; cursor:pointer;
  font:inherit; color:inherit; padding:13px 18px}
.rmain:hover{background:#FBFBF9}
.rmain:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.rank{font-size:15px; color:var(--faint); font-weight:600}
.row.lead .rank{color:var(--accent)}
.who{min-width:0}
.name{font-weight:600; font-size:16.5px; letter-spacing:-.01em; display:flex; align-items:center; gap:8px}
.tag{font-size:10.5px; font-weight:700; letter-spacing:.06em; color:var(--accent);
  background:var(--accent-tint); padding:2px 7px; border-radius:6px; text-transform:uppercase}
.form{display:flex; gap:3px; margin-top:7px; flex-wrap:wrap}
.pip{width:9px; height:9px; border-radius:2.5px; background:var(--p0)}
.pip.v7{background:var(--p7)} .pip.v5{background:var(--p5)}
.pip.v3{background:var(--p3)} .pip.v2{background:var(--p2)}
.pts{justify-self:end; text-align:right}
.pts b{font-size:23px; font-weight:700; letter-spacing:-.02em; line-height:1}
.row.lead .pts b{color:var(--accent)}
.pts small{display:block; color:var(--faint); font-size:11px; font-weight:600; margin-top:3px;
  letter-spacing:.02em}

/* Detail */
.detail{display:none; padding:6px 18px 20px; background:#FBFBF9; border-top:1px dashed var(--line)}
.row.open .detail{display:block}
.dsum{font-size:13px; color:var(--muted); font-weight:600; padding:12px 0 2px}
.dsum b{color:var(--ink)}
.dgrid{display:grid; grid-template-columns:1fr; gap:2px}
.dgroup{margin-top:16px}
.dgroup h4{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint);
  font-weight:600; margin:0 0 6px}
.match{display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center;
  padding:7px 0; border-bottom:1px solid var(--line-soft)}
.match:last-child{border-bottom:0}
.teams{font-size:14.5px; min-width:0}
.teams .vs{color:var(--faint)}
.guess{font-size:13px; color:var(--muted); margin-top:1px}
.guess b{color:var(--ink); font-weight:600}
.facit{font-size:13.5px; font-weight:600; white-space:nowrap; color:var(--muted)}
.facit .na{color:var(--faint); font-weight:500}
.pill{justify-self:end; min-width:30px; text-align:center; font-size:13px; font-weight:700;
  padding:3px 8px; border-radius:8px; background:var(--p0); color:var(--muted)}
.pill.v7{background:var(--p7); color:#fff} .pill.v5{background:var(--p5); color:#fff}
.pill.v3{background:var(--p3); color:#fff} .pill.v2{background:var(--p2); color:#33514f}
.bonus{margin-top:16px}
.brow{display:flex; justify-content:space-between; gap:10px; padding:6px 0;
  border-bottom:1px solid var(--line-soft); font-size:14px}
.brow:last-child{border-bottom:0}
.brow .q{color:var(--muted)} .brow .a{font-weight:600; text-align:right}
.brow .a.empty{color:var(--faint); font-weight:500; font-style:italic}

/* Matches view */
.mgroup{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  margin-bottom:12px; overflow:hidden}
.mhead{padding:11px 18px; border-bottom:1px solid var(--line); font-weight:700; font-size:14px;
  letter-spacing:.02em; display:flex; justify-content:space-between; align-items:center}
.mhead span{color:var(--faint); font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:600}
.mitem{display:grid; grid-template-columns:58px 1fr auto; gap:12px; align-items:center;
  padding:10px 18px; border-bottom:1px solid var(--line-soft); font-size:14.5px}
.mitem:last-child{border-bottom:0}
.mdate{color:var(--faint); font-size:12px}
.mteams{min-width:0}
.mteams .h,.mteams .a{font-weight:500}
.mteams .vs{color:var(--faint); margin:0 6px}
.mscore{justify-self:end; font-weight:700; font-size:15px; white-space:nowrap}
.mscore .na{color:var(--faint); font-weight:500; font-size:13px}
.played .h.win,.played .a.win{font-weight:700}

footer{margin-top:26px; color:var(--faint); font-size:12.5px; line-height:1.6; padding:0 2px}
footer a{color:var(--accent); text-decoration:none}

@media (max-width:520px){
  h1{font-size:32px}
  .form{display:none}
  .rmain{grid-template-columns:28px 1fr auto; gap:10px; padding:13px 15px}
  .pts small{display:none}
  .pts b{font-size:21px}
  .name{font-size:15.5px}
  .thead{padding-left:15px; padding-right:15px}
  .detail{padding-left:15px; padding-right:15px}
}
</style>
</head>

  <main>

  </footer>
</div>

<script>
const POINT_CLASS = v => v>=7?'v7':v>=5?'v5':v>=3?'v3':v>=1?'v2':'';
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let DATA = JSON.parse(document.getElementById('seed').textContent);

function fmtUpdated(iso){
  try{
    const d=new Date(iso);
    return 'Uppdaterad '+d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'})+
      ' '+d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  }catch(e){return ''}
}

function render(){
  const played = DATA.matches.filter(m=>m.played).length;
  document.getElementById('updated').textContent = fmtUpdated(DATA.updated);
  document.getElementById('meta').textContent = played+' av '+DATA.matches.length+' gruppmatcher spelade';
  renderBoard();
  renderMatches();
}

function renderBoard(){
  const matchById = Object.fromEntries(DATA.matches.map(m=>[m.no,m]));
  const playedNos = DATA.matches.filter(m=>m.played).map(m=>m.no);
  let h = '<div class="board"><div class="thead"><div>#</div><div>Namn</div><div class="p">Poäng</div></div>';
  DATA.players.forEach((p,i)=>{
    const lead = i===0 ? ' lead':'';
    const tag = p.name==='Noel Holmström' ? '<span class="tag">Du</span>':'';
    const pips = playedNos.map(no=>{
      const pr=p.predictions[no]; const v=pr?pr.points:0;
      return '<span class="pip '+POINT_CLASS(v)+'"></span>';
    }).join('');
    h += '<div class="row'+lead+'" data-i="'+i+'">'
      + '<button class="rmain" aria-expanded="false">'
      +   '<div class="rank">'+(i+1)+'</div>'
      +   '<div class="who"><div class="name">'+esc(p.name)+tag+'</div>'
      +     '<div class="form">'+pips+'</div></div>'
      +   '<div class="pts"><b>'+p.total+'</b>'
      +     '<small>'+p.groupPoints+' grupp · '+p.knockoutPoints+' slutsp · '+p.bonusPoints+' bonus</small></div>'
      + '</button>'
      + '<div class="detail">'+detailHTML(p,matchById)+'</div>'
      + '</div>';
  });
  h += '</div>';
  document.getElementById('board').innerHTML = h;
  document.querySelectorAll('#board .row').forEach(row=>{
    const btn=row.querySelector('.rmain');
    btn.addEventListener('click',()=>{
      const open=row.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
  });
}

    let rows='';
    groups[g].forEach(m=>{
      const pr=p.predictions[m.no]; if(!pr) return;
      const guess = (pr.home==null?'–':pr.home)+'–'+(pr.away==null?'–':pr.away);
      const facit = m.played ? '<span class="facit">'+m.homeGoals+'–'+m.awayGoals+'</span>'

      const pillv = m.played ? POINT_CLASS(pr.points) : '';
      const pill = m.played ? '<span class="pill '+pillv+'">'+pr.points+'</span>'
                            : '<span class="pill">–</span>';
      rows += '<div class="match"><div class="teams">'+esc(m.home)+' <span class="vs">–</span> '+esc(m.away)
        + '<div class="guess">Tippat <b>'+guess+'</b></div></div>'
        + facit + pill + '</div>';
    });
    if(rows) h+='<div class="dgroup"><h4>Grupp '+g+'</h4>'+rows+'</div>';
  });
  h+='</div>';
  // bonus
  if(p.bonus && p.bonus.length){
    h+='<div class="bonus"><h4 style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:18px 0 6px">Bonusfrågor</h4>';
    p.bonus.forEach(b=>{
      const ans = b.answer ? '<span class="a">'+esc(b.answer)+'</span>' : '<span class="a empty">ej ifylld</span>';
      h+='<div class="brow"><span class="q">'+esc(b.category)+'</span>'+ans+'</div>';
    });
    h+='</div>';
  }
  return h;
}

function renderMatches(){
  const groups={};
  DATA.matches.forEach(m=>{(groups[m.group]=groups[m.group]||[]).push(m)});
  let h='';
  Object.keys(groups).sort().forEach(g=>{
    const ms=groups[g];
    const done=ms.filter(m=>m.played).length;
    let items='';
    ms.forEach(m=>{
      const date = m.date ? m.date.slice(5).replace('-','/') : '';
      let score, hw='', aw='';
      if(m.played){
        score='<span class="mscore">'+m.homeGoals+'–'+m.awayGoals+'</span>';
        if(m.homeGoals>m.awayGoals) hw='win'; else if(m.awayGoals>m.homeGoals) aw='win';
      }else{
        score='<span class="mscore"><span class="na">–</span></span>';
      }
      items += '<div class="mitem '+(m.played?'played':'')+'"><div class="mdate">'+date+'</div>'
        + '<div class="mteams"><span class="h '+hw+'">'+esc(m.home)+'</span>'
        + '<span class="vs">–</span><span class="a '+aw+'">'+esc(m.away)+'</span></div>'
        + score + '</div>';
    });
    h+='<div class="mgroup"><div class="mhead">Grupp '+g+'<span>'+done+'/'+ms.length+'</span></div>'+items+'</div>';
  });
  document.getElementById('matches').innerHTML=h;
}

// view switching
document.querySelectorAll('.seg button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.seg button').forEach(x=>x.setAttribute('aria-selected', x===b));
    const v=b.dataset.view;
    document.getElementById('board').hidden = v!=='board';
    document.getElementById('matches').hidden = v!=='matches';
  });
});

render();

// live data: override embedded seed when deployed (Actions regenerates data.json)
fetch('data.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{
  if(d && d.players){ DATA=d; render(); }
}).catch(()=>{});
</script>
</body>
</html>
