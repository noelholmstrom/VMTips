<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VM 2026 — Ställningen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F5F4; --surface:#FFFFFF; --ink:#13181C; --muted:#6A7178;
  --faint:#A0A6AB; --line:#E7E8E5; --line-soft:#F0F1EE;
  --green:#0B6E4F; --green-bright:#14A06E; --green-deep:#085A40;
  --gold:#E0A52C; --gold-soft:#FBF1D8; --amber:#D98A2B;
  --silver:#9AA3AC; --bronze:#C5824B;
  --p7:#0B6E4F; --p5:#2E9E72; --p3:#7FC2A4; --p2:#C2E0D2; --p0:#E7E7E2;
  --radius:16px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family: 'Hanken Grotesk', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background-color: var(--bg);
  background-image: url('vmbild_alpha.webp');
  background-repeat: no-repeat;
  background-position: right center;
  background-size: 22% auto;
  background-attachment: fixed;
}
.hero::after{content:""; position:absolute; right:-50px; top:-60px; width:230px; height:230px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.22), rgba(255,255,255,0) 70%)}
.hinner{max-width:760px; margin:0 auto; position:relative}
.hero .eyebrow{font-size:12px; letter-spacing:.18em; text-transform:uppercase; font-weight:700;
  color:rgba(255,255,255,.82); display:flex; align-items:center; gap:8px}
.hero h1{font-size:42px; line-height:1; letter-spacing:-.025em; margin:.16em 0 .14em; font-weight:800}
.hero .sub{color:rgba(255,255,255,.82); font-size:14px; font-weight:500}
.hero .sub .dot{margin:0 .5em; opacity:.6}
.ball{width:20px;height:20px;flex:none}

.tabs{position:sticky; top:0; z-index:5; background:rgba(243,245,244,.92);
  backdrop-filter:saturate(1.4) blur(8px); border-bottom:1px solid var(--line); padding:10px 14px}
.seg{display:flex; gap:4px; max-width:760px; margin:0 auto}
.seg button{flex:1; appearance:none; border:1px solid var(--line); background:var(--surface); cursor:pointer;
  font:inherit; font-weight:700; font-size:13.5px; color:var(--muted); padding:9px 6px; border-radius:11px; transition:.16s}
.seg button[aria-selected="true"]{background:var(--green); border-color:var(--green); color:#fff; box-shadow:0 2px 8px rgba(11,110,79,.28)}
.seg button:focus-visible{outline:2px solid var(--green); outline-offset:2px}
main{padding:18px 18px 0}

/* Standings (players) */
.board{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:0 1px 2px rgba(20,30,25,.03)}
.thead{display:grid; grid-template-columns:38px 1fr auto; gap:12px; padding:12px 18px; border-bottom:1px solid var(--line);
  color:var(--faint); font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:700}
.thead .p{justify-self:end}
.row{border-bottom:1px solid var(--line-soft)}
.row:last-child{border-bottom:0}
.row.lead{background:linear-gradient(90deg,var(--gold-soft),transparent 70%)}
.rmain{display:grid; grid-template-columns:38px 1fr auto; gap:12px; align-items:center; width:100%; text-align:left;
  background:transparent; border:0; cursor:pointer; font:inherit; color:inherit; padding:14px 18px}
.rmain:hover{background:rgba(11,110,79,.035)}
.rmain:focus-visible{outline:2px solid var(--green); outline-offset:-2px}
.rank{display:flex; align-items:center; justify-content:center; width:26px; height:26px; font-size:14px; font-weight:700; color:var(--faint)}
.row.m1 .rank{background:var(--gold); color:#fff; border-radius:8px}
.row.m2 .rank{background:var(--silver); color:#fff; border-radius:8px}
.row.m3 .rank{background:var(--bronze); color:#fff; border-radius:8px}
.who{min-width:0}
.name{font-weight:700; font-size:16.5px; letter-spacing:-.01em; display:flex; align-items:center; gap:7px}
.trophy{font-size:15px}
.form{display:flex; gap:3px; margin-top:7px; flex-wrap:wrap}
.pip{width:9px; height:9px; border-radius:2.5px; background:var(--p0)}
.pip.v7{background:var(--p7)} .pip.v5{background:var(--p5)} .pip.v3{background:var(--p3)} .pip.v2{background:var(--p2)}
.pts{justify-self:end; text-align:right}
.pts b{font-size:24px; font-weight:800; letter-spacing:-.02em; line-height:1}
.row.lead .pts b{color:var(--green)}
.pts small{display:block; color:var(--faint); font-size:11px; font-weight:600; margin-top:3px}

.detail{display:none; padding:4px 18px 20px; background:#FAFBFA; border-top:1px dashed var(--line)}
.row.open .detail{display:block}
.dsum{font-size:13px; color:var(--muted); font-weight:600; padding:12px 0 2px}
.dsum b{color:var(--ink)}
.dgroup{margin-top:16px}
.dgroup h4{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--green); font-weight:700; margin:0 0 7px}
.match{display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--line-soft)}
.match:last-child{border-bottom:0}
.teams{font-size:14.5px; min-width:0; display:flex; align-items:center; gap:6px; flex-wrap:wrap}
.teams .vs{color:var(--faint)}
.guess{font-size:13px; color:var(--muted); margin-top:2px}
.guess b{color:var(--ink); font-weight:700}
.facit{font-size:13.5px; font-weight:700; white-space:nowrap; color:var(--muted)}
.facit .na{color:var(--faint); font-weight:500}
.pill{justify-self:end; min-width:30px; text-align:center; font-size:13px; font-weight:800; padding:3px 8px; border-radius:9px; background:var(--p0); color:var(--muted)}
.pill.v7{background:var(--p7); color:#fff} .pill.v5{background:var(--p5); color:#fff}
.pill.v3{background:var(--p3); color:#fff} .pill.v2{background:var(--p2); color:#2f5e4b}
.bonus{margin-top:18px}
.bonus h4{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--green); font-weight:700; margin:0 0 6px}
.brow{display:flex; justify-content:space-between; gap:10px; padding:6px 0; border-bottom:1px solid var(--line-soft); font-size:14px}
.brow:last-child{border-bottom:0}
.brow .q{color:var(--muted)} .brow .a{font-weight:700; text-align:right}
.brow .a.empty{color:var(--faint); font-weight:500; font-style:italic}

/* Cards (groups, knockout, rules) */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; box-shadow:0 1px 2px rgba(20,30,25,.03)}
.mhead{padding:12px 18px; border-bottom:1px solid var(--line); font-weight:800; font-size:14.5px; letter-spacing:.01em; display:flex; justify-content:space-between; align-items:center}
.mhead .badge{display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:22px; padding:0 7px; background:var(--green); color:#fff; border-radius:7px; font-size:12px; font-weight:800; margin-right:9px}
.mhead .count{color:var(--faint); font-size:11px; letter-spacing:.08em; text-transform:uppercase; font-weight:700}
.kcard .mhead .badge{background:var(--gold)}

/* Group standings table */
.stbl{width:100%; border-collapse:collapse; font-size:13.5px}
.stbl th{font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); font-weight:700; padding:9px 4px 7px; text-align:center}
.stbl th.lag{text-align:left; padding-left:18px}
.stbl td{padding:8px 4px; text-align:center; border-top:1px solid var(--line-soft); color:var(--muted)}
.stbl td.lag{text-align:left; padding-left:14px; color:var(--ink); font-weight:600; display:flex; align-items:center; gap:8px}
.stbl td.pp{color:var(--ink); font-weight:800}
.stbl tr.q td.lag{box-shadow:inset 4px 0 0 var(--green)}
.stbl tr.c td.lag{box-shadow:inset 4px 0 0 var(--amber)}
.stbl .pos{display:inline-block; width:14px; color:var(--faint); font-weight:700; font-size:12px}
.legend{display:flex; gap:16px; align-items:center; margin:2px 2px 12px; font-size:12px; color:var(--muted); flex-wrap:wrap}
.legend .ch{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:6px; vertical-align:-1px}
.gfix{padding:4px 0 2px}
.gfix .sub{font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); font-weight:700; padding:10px 18px 4px}

/* Fixtures */
.mitem{display:grid; grid-template-columns:54px 1fr auto; gap:12px; align-items:center; padding:11px 18px; border-bottom:1px solid var(--line-soft); font-size:14.5px}
.mitem:last-child{border-bottom:0}
.mdate{color:var(--faint); font-size:12px; font-weight:600}
.mteams{min-width:0; display:flex; align-items:center; gap:4px; flex-wrap:wrap}
.mteams .vs{color:var(--faint); margin:0 3px}
.side{display:flex; align-items:center; gap:6px}
.tName.tbd{color:var(--faint); font-style:italic; font-weight:500}
.mscore{justify-self:end; font-weight:800; font-size:15px; white-space:nowrap}
.mscore .na{color:var(--faint); font-weight:600; font-size:13px}
.win{font-weight:800}
.flag{width:21px; height:15px; border-radius:2px; object-fit:cover; box-shadow:0 0 0 1px rgba(0,0,0,.06); flex:none}

/* Rules */
.rrow{display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:9px 18px; border-top:1px solid var(--line-soft); font-size:14.5px}
.rrow:first-of-type{border-top:0}
.rrow .lbl{color:var(--ink)}
.rrow .val{font-weight:800; color:var(--green); white-space:nowrap}
.rnote{padding:12px 18px; color:var(--muted); font-size:13.5px; line-height:1.55}
.rnote p{margin:0 0 9px} .rnote p:last-child{margin:0}
.dist{width:100%; border-collapse:collapse; font-size:13.5px}
.dist th{font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); font-weight:700; padding:9px 12px 7px; text-align:right}
.dist th.l{text-align:left; padding-left:18px}
.dist td{padding:8px 12px; text-align:right; border-top:1px solid var(--line-soft); color:var(--muted)}
.dist td.l{text-align:left; padding-left:18px; color:var(--ink); font-weight:600}
.dist tr.tot td{border-top:2px solid var(--line); color:var(--ink); font-weight:800}
.dist td.tp{color:var(--green); font-weight:800}

footer{margin:26px 18px 0; color:var(--faint); font-size:12.5px; line-height:1.6}

@media (max-width:520px){
  .hero{padding:26px 16px 22px} .hero h1{font-size:34px}
  main{padding:16px 12px 0}
  .seg button{font-size:12.5px; padding:9px 4px}
  .form{display:none}
  .rmain{grid-template-columns:32px 1fr auto; gap:10px; padding:14px 14px}
  .pts small{display:none} .pts b{font-size:22px} .name{font-size:15.5px}
  .thead{padding-left:14px; padding-right:14px}
  .detail{padding-left:14px; padding-right:14px}
  .mitem{padding-left:14px; padding-right:14px; grid-template-columns:46px 1fr auto}
  .stbl{font-size:12.5px} .stbl td,.stbl th{padding-left:2px; padding-right:2px}
  .stbl th.lag,.stbl td.lag{padding-left:12px}
}

@media (max-width:900px){
  /* keep background on smaller screens but scale with cover */
}

/* Transparent surfaces so background shows through */
.board, .card, .tabs, .mhead, footer, .hero{
  background: rgba(255,255,255,0.24);
  border-color: rgba(0,0,0,0.04);
  backdrop-filter: blur(8px) saturate(1.05);
  -webkit-backdrop-filter: blur(8px) saturate(1.05);
  box-shadow: none;
}
.rmain{background: rgba(255,255,255,0.04)}
.row{background:transparent}
.thead{background:transparent}
.row.lead{background:linear-gradient(90deg, rgba(224,165,44,0.08), rgba(224,165,44,0.01) 70%)}
.mhead .badge{box-shadow:none}

/* Increase text contrast over variable backgrounds */
.name, .pts b, .mhead, .thead{color:var(--ink); text-shadow:0 1px 0 rgba(255,255,255,0.35)}
</style>
</head>

<script>
const FLAGS = {"Algeriet": "dz", "Argentina": "ar", "Australien": "au", "Belgien": "be", "Bosnien-Herzigovina": "ba", "Brasilien": "br", "Colombia": "co", "Curaçao": "cw", "Czechia": "cz", "Ecuador": "ec", "Egypten": "eg", "Elfenbenskusten": "ci", "England": "gb-eng", "Frankrike": "fr", "Ghana": "gh", "Haiti": "ht", "Irak": "iq", "Iran": "ir", "Japan": "jp", "Jordanien": "jo", "Kanada": "ca", "Kap Verde": "cv", "Kongo": "cd", "Kroatien": "hr", "Marocko": "ma", "Mexiko": "mx", "Nederländerna": "nl", "Norge": "no", "Nya Zeeland": "nz", "Panama": "pa", "Paraguay": "py", "Portugal": "pt", "Qatar": "qa", "Saudiarabien": "sa", "Schweiz": "ch", "Senegal": "sn", "Skottland": "gb-sct", "Spanien": "es", "Sverige": "se", "Sydafrika": "za", "Sydkorea": "kr", "Tunisien": "tn", "Turkiet": "tr", "Tyskland": "de", "USA": "us", "Uruguay": "uy", "Uzbekistan": "uz", "Österrike": "at"};
const POINT_CLASS = v => v>=7?'v7':v>=5?'v5':v>=3?'v3':v>=1?'v2':'';
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let DATA = JSON.parse(document.getElementById('seed').textContent);

function flag(name){const iso=FLAGS[name];
  return iso?'<img class="flag" loading="lazy" alt="" onerror="this.style.display=\'none\'" src="https://flagcdn.com/w40/'+iso+'.png">':'';}
function teamCell(name){const f=flag(name); return f+'<span class="'+(f?'tName':'tName tbd')+'">'+esc(name)+'</span>';}
function fmtUpdated(iso){try{const d=new Date(iso);
  return 'Uppdaterad '+d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});}catch(e){return ''}}

function render(){
  const played=DATA.matches.filter(m=>m.played).length;
  document.getElementById('updated').textContent=fmtUpdated(DATA.updated);
  document.getElementById('meta').textContent=played+' av '+DATA.matches.length+' gruppmatcher spelade';
  renderBoard(); renderGroups(); renderKnockout(); renderRules();
}

function renderBoard(){
  const playedNos=DATA.matches.filter(m=>m.played).map(m=>m.no);
  let h='<div class="board"><div class="thead"><div>#</div><div>Namn</div><div class="p">Poäng</div></div>';
  DATA.players.forEach((p,i)=>{
    const medal=i<3?' m'+(i+1):''; const lead=i===0?' lead':'';
    const trophy=i===0?'<span class="trophy">🏆</span>':'';
    const pips=playedNos.map(no=>{const pr=p.predictions[no]; const v=pr?pr.points:0; return '<span class="pip '+POINT_CLASS(v)+'"></span>';}).join('');
    h+='<div class="row'+medal+lead+'"><button class="rmain" aria-expanded="false">'
      +'<div class="rank">'+(i+1)+'</div>'
      +'<div class="who"><div class="name">'+esc(p.name)+trophy+'</div><div class="form">'+pips+'</div></div>'

      +'</button><div class="detail">'+detailHTML(p)+'</div></div>';
  });
  h+='</div>';
  document.getElementById('board').innerHTML=h;
  document.querySelectorAll('#board .row').forEach(row=>{
    const btn=row.querySelector('.rmain');
    btn.addEventListener('click',()=>{const open=row.classList.toggle('open'); btn.setAttribute('aria-expanded',open);});
  });
}

function detailHTML(p){
  const groups={}; DATA.matches.forEach(m=>{(groups[m.group]=groups[m.group]||[]).push(m)});
  let h='<div class="dsum">Totalt <b>'+p.total+' p</b> &nbsp;·&nbsp; Grupp '+p.groupPoints+' &nbsp;·&nbsp; Slutspel '+p.knockoutPoints+' &nbsp;·&nbsp; Bonus '+p.bonusPoints+'</div>';
  Object.keys(groups).sort().forEach(g=>{
    let rows='';
    groups[g].forEach(m=>{
      const pr=p.predictions[m.no]; if(!pr) return;
      const guess=(pr.home==null?'–':pr.home)+'–'+(pr.away==null?'–':pr.away);
      const facit=m.played?'<span class="facit">'+m.homeGoals+'–'+m.awayGoals+'</span>':'<span class="facit"><span class="na">ej spelad</span></span>';
      const pill=m.played?'<span class="pill '+POINT_CLASS(pr.points)+'">'+pr.points+'</span>':'<span class="pill">–</span>';
      rows+='<div class="match"><div><div class="teams">'+teamCell(m.home)+'<span class="vs">–</span>'+teamCell(m.away)+'</div><div class="guess">Tippat <b>'+guess+'</b></div></div>'+facit+pill+'</div>';
    });
    if(rows) h+='<div class="dgroup"><h4>Grupp '+g+'</h4>'+rows+'</div>';
  });
  if(p.bonus&&p.bonus.length){h+='<div class="bonus"><h4>Bonusfrågor</h4>';
    p.bonus.forEach(b=>{const ans=b.answer?'<span class="a">'+esc(b.answer)+'</span>':'<span class="a empty">ej ifylld</span>';
      h+='<div class="brow"><span class="q">'+esc(b.category)+'</span>'+ans+'</div>';}); h+='</div>';}
  return h;
}

  const date=m.date?m.date.slice(5).replace('-','/'):'';
  let score,hw='',aw='';
  if(m.played){score='<span class="mscore">'+m.homeGoals+'–'+m.awayGoals+'</span>';
    if(m.homeGoals>m.awayGoals)hw='win'; else if(m.awayGoals>m.homeGoals)aw='win';}
  else score='<span class="mscore"><span class="na">–</span></span>';
  return '<div class="mitem"><div class="mdate">'+date+'</div>'
    +'<div class="mteams"><span class="side '+hw+'">'+teamCell(m.home)+'</span><span class="vs">–</span><span class="side '+aw+'">'+teamCell(m.away)+'</span></div>'+score+'</div>';
}

function standingsTable(rows){
  let h='<table class="stbl"><thead><tr><th class="lag">Lag</th><th>V</th><th>O</th><th>F</th><th>GM</th><th>IM</th><th>+/-</th><th>P</th></tr></thead><tbody>';
  rows.forEach((t,i)=>{
    const cls=i<2?'q':(i===2?'c':'');
    const gd=(t.gd>0?'+':'')+t.gd;
    h+='<tr class="'+cls+'"><td class="lag"><span class="pos">'+(i+1)+'</span>'+teamCell(t.team)+'</td>'
      +'<td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td><td>'+t.gf+'</td><td>'+t.ga+'</td><td>'+gd+'</td><td class="pp">'+t.pts+'</td></tr>';
  });
  return h+'</tbody></table>';
}

function renderGroups(){
  const fixtures={}; DATA.matches.forEach(m=>{(fixtures[m.group]=fixtures[m.group]||[]).push(m)});
  const st=DATA.standings||{};
  let h='<div class="legend"><span><span class="ch" style="background:var(--green)"></span>Vidare till slutspel</span>'
       +'<span><span class="ch" style="background:var(--amber)"></span>Möjlig bästa trea</span></div>';
  Object.keys(fixtures).sort().forEach(g=>{
    const ms=fixtures[g]; const done=ms.filter(m=>m.played).length;
    h+='<div class="card"><div class="mhead"><span><span class="badge">'+g+'</span>Grupp '+g+'</span><span class="count">'+done+'/'+ms.length+' spelade</span></div>';
    if(st[g]) h+=standingsTable(st[g]);
    h+='<div class="gfix"><div class="sub">Matcher</div>'+ms.map(fixtureItem).join('')+'</div></div>';
  });
  document.getElementById('groups').innerHTML=h;
}

function renderKnockout(){
  const order=['Sextondelsfinal','Åttondelsfinal','Kvartsfinal','Semifinal','Bronsmatch','Final'];
  const ko=DATA.knockout||[]; const byRound={};
  ko.forEach(m=>{(byRound[m.round]=byRound[m.round]||[]).push(m)});
  let h='';
  if(!ko.length) h='<div class="card kcard"><div class="mhead">Slutspelet börjar efter gruppspelet</div></div>';
  order.forEach(rnd=>{const ms=byRound[rnd]; if(!ms) return;
    const done=ms.filter(m=>m.played).length;
    h+='<div class="card kcard"><div class="mhead"><span>'+rnd+'</span><span class="count">'+done+'/'+ms.length+'</span></div>'+ms.map(fixtureItem).join('')+'</div>';});
  document.getElementById('knockout').innerHTML=h;
}

function ruleCard(title, items){
  let h='<div class="card"><div class="mhead"><span>'+title+'</span></div>';
  items.forEach(it=>{h+='<div class="rrow"><span class="lbl">'+it[0]+'</span><span class="val">'+it[1]+'</span></div>';});
  return h+'</div>';
}

function renderRules(){
  let h='';
  h+=ruleCard('Gruppspel', [
    ['Rätt antal mål för ett lag','2 p'],
    ['Rätt tecken (1X2)','3 p'],
    ['Maxpoäng per match','7 p']
  ]);
  h+=ruleCard('Slutspel — rätt lag vidare', [
    ['Sextondelsfinal','1 p / lag'],['Åttondelsfinal','2 p / lag'],['Kvartsfinal','4 p / lag'],
    ['Semifinal','6 p / lag'],['Bronsmatch','8 p / lag'],['Final','8 p / lag']
  ]);
  h+=ruleCard('Bonusfrågor', [
    ['Skyttekung','20 p'],['Världsmästare','20 p'],['Vinnare bronsmatch','20 p'],
    ['Lag med flest mål i gruppspelet','10 p'],['Lag med flest insläppta i gruppspelet','10 p'],
    ['Egen bonusfråga 1','10 p'],['Egen bonusfråga 2','10 p']
  ]);
  h+='<div class="card"><div class="mhead"><span>Poängfördelning</span><span class="count">Totalt 980 p</span></div>'
    +'<table class="dist"><thead><tr><th class="l">Del</th><th>Match/prediktion</th><th>Bonus</th><th>Totalt</th></tr></thead><tbody>'
    +distRow('Gruppspel',504,'–',504)+distRow('Sextondelsfinal',112,32,144)+distRow('Åttondelsfinal',56,32,88)
    +distRow('Kvartsfinal',28,32,60)+distRow('Semifinal',14,24,38)+distRow('Bronsmatch',7,16,23)+distRow('Final',7,16,23)
    +distRow('Bonusfrågor','–',100,100)
    +'<tr class="tot"><td class="l">Totalt</td><td>728</td><td>252</td><td>980</td></tr>'
    +'</tbody></table></div>';
  h+='<div class="card"><div class="mhead"><span>Bra att veta</span></div><div class="rnote">'
    +'<p>Slutspelsbonusen delas ut allt eftersom matcherna spelas: när en match i en slutspelsomgång är spelad delas bonus ut för de två lagen i den matchen.</p>'
    +'<p>Från sextondelsfinalerna och framåt går det att tippa ett annat lag vidare än vad resultatet visar (t.ex. resultat 1–2 men ändå hemmalaget vidare). Då markeras matchen som "EJ OK" — tipsgeneralen avgör om det godkänns.</p>'
    +'<p>Bestäm i förväg om slutresultatet räknas efter 90 minuter, eventuell förlängning eller straffar.</p>'
    +'</div></div>';
  document.getElementById('rules').innerHTML=h;
}
function distRow(name,m,b,t){return '<tr><td class="l">'+name+'</td><td>'+m+'</td><td>'+b+'</td><td class="tp">'+t+'</td></tr>';}

document.querySelectorAll('.seg button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.seg button').forEach(x=>x.setAttribute('aria-selected',x===b));
    const v=b.dataset.view;
    ['board','groups','knockout','rules'].forEach(id=>{document.getElementById(id).hidden=(id!==v);});
    window.scrollTo({top:0});
  });
});

render();
fetch('data.json?t='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{if(d&&d.players){DATA=d; render();}}).catch(()=>{});
</script>
</body>
</html>
